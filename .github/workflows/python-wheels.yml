name: Python wheels

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish_target:
        description: "Optional package index publish target"
        required: true
        default: "none"
        type: choice
        options:
          - "none"
          - "testpypi"
          - "pypi"

jobs:
  wheels:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
          - { os: macos-latest, target: aarch64-apple-darwin }
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu }
          - { os: ubuntu-latest, target: aarch64-unknown-linux-gnu }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          path: mercurio-host-adapters
      - uses: actions/checkout@v4
        with:
          repository: mercurio-labs/mercurio-foundation
          path: mercurio-foundation
      - uses: actions/checkout@v4
        with:
          repository: mercurio-labs/mercurio-sysml
          path: mercurio-sysml
      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          working-directory: mercurio-host-adapters/crates/mercurio-python
          args: >-
            --release
            --out dist
            --features embed-stdlib
            --interpreter 3.10 3.11 3.12 3.13
      - uses: actions/upload-artifact@v4
        with:
          name: python-wheels-${{ matrix.target }}
          path: mercurio-host-adapters/crates/mercurio-python/dist/*.whl

  github-release:
    needs: [wheels, smoke-python-examples]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: python-wheels-*
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*.whl
          prerelease: ${{ contains(github.ref_name, 'a') || contains(github.ref_name, 'b') || contains(github.ref_name, 'rc') }}
          generate_release_notes: true

  smoke-python-examples:
    needs: wheels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: mercurio-labs/mercurio-examples
          path: mercurio-examples
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/download-artifact@v4
        with:
          name: python-wheels-x86_64-unknown-linux-gnu
          path: dist
      - name: Install released wheel candidate
        run: |
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl
          python -c "import mercurio; print(mercurio.__version__)"
      - name: Run pure Python examples
        working-directory: mercurio-examples/python
        run: |
          . ../../.venv/bin/activate
          for example in 0*.py; do
            echo "::group::$example"
            python "$example"
            echo "::endgroup::"
          done

  publish-testpypi:
    needs: wheels
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.publish_target == 'testpypi'
    environment: testpypi
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: python-wheels-*
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    needs: wheels
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.publish_target == 'pypi'
    environment: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: python-wheels-*
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
